<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contador de Palabras | HerramientasPro</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(2,6,23,0.8);
}

.main{
display:flex;
justify-content:center;
align-items:center;
min-height:90vh;
}

.card{
background:#1e293b;
padding:40px;
border-radius:15px;
width:500px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.icon{
font-size:30px;
color:#3b82f6;
margin-bottom:10px;
}

textarea{
width:100%;
height:150px;
padding:15px;
border:none;
border-radius:10px;
resize:none;
margin-top:10px;
}

.resultados{
margin-top:20px;
display:flex;
justify-content:space-around;
}

.box{
background:#334155;
padding:15px;
border-radius:10px;
width:120px;
}

.box h3{
font-size:18px;
}

.box p{
font-size:20px;
margin-top:5px;
color:#22c55e;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#475569;
color:white;
}

button:hover{
background:#334155;
}

.back{
display:block;
margin-top:20px;
color:#94a3b8;
text-decoration:none;
}

</style>
</head>

<body>

<nav>
<h1>HerramientasPro</h1>
<a href="index.html">Inicio</a>
</nav>

<div class="main">

<div class="card">

<div class="icon">
<i class="fas fa-keyboard"></i>
</div>

<h2>Contador de palabras</h2>

<textarea id="texto" placeholder="Escribe o pega tu texto aquí..."></textarea>

<div class="resultados">
<div class="box">
<h3>Palabras</h3>
<p id="palabras">0</p>
</div>

<div class="box">
<h3>Caracteres</h3>
<p id="caracteres">0</p>
</div>
</div>

<button onclick="limpiar()">Limpiar</button>

<a class="back" href="index.html">Volver</a>

</div>

</div>

<script>

let texto = document.getElementById("texto");

texto.addEventListener("input", actualizar);

function actualizar(){

let contenido = texto.value;

let palabras = contenido.trim().split(/\s+/).filter(p => p.length > 0);
let caracteres = contenido.length;

document.getElementById("palabras").innerText = palabras.length;
document.getElementById("caracteres").innerText = caracteres;

}

function limpiar(){
texto.value="";
actualizar();
}

</script>

</body>
</html>
