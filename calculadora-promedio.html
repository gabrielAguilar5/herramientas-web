<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Promedio | HerramientasPro</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(2,6,23,0.8);
backdrop-filter:blur(10px);
}

nav h1{
font-size:20px;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* CONTENEDOR */
.main{
display:flex;
justify-content:center;
align-items:center;
height:90vh;
}

.card{
background:#1e293b;
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.3);
animation:fadeIn 1s ease;
}

/* ICONO */
.icon{
font-size:35px;
margin-bottom:10px;
color:#3b82f6;
}

h2{
margin-bottom:20px;
}

/* INPUTS */
input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
outline:none;
font-size:16px;
}

/* BOTONES */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.calcular{
background:#3b82f6;
color:white;
}

.calcular:hover{
background:#2563eb;
}

.limpiar{
background:#475569;
color:white;
}

.limpiar:hover{
background:#334155;
}

/* RESULTADO */
.resultado{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#22c55e;
}

.error{
margin-top:10px;
color:#ef4444;
}

/* ANIMACIÓN */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.back{
display:block;
margin-top:20px;
color:#94a3b8;
text-decoration:none;
font-size:14px;
}

</style>
</head>

<body>

<nav>
<h1>HerramientasPro</h1>
<div>
<a href="index.html">Inicio</a>
</div>
</nav>

<div class="main">

<div class="card">

<div class="icon">
<i class="fas fa-calculator"></i>
</div>

<h2>Calculadora de Promedio</h2>

<input type="number" id="n1" placeholder="Número 1">
<input type="number" id="n2" placeholder="Número 2">
<input type="number" id="n3" placeholder="Número 3">

<button class="calcular" onclick="calcular()">Calcular promedio</button>
<button class="limpiar" onclick="limpiar()">Limpiar</button>

<div id="resultado" class="resultado"></div>
<div id="error" class="error"></div>

<a class="back" href="index.html">Volver al inicio</a>

</div>

</div>

<script>

function calcular(){

let n1 = parseFloat(document.getElementById("n1").value);
let n2 = parseFloat(document.getElementById("n2").value);
let n3 = parseFloat(document.getElementById("n3").value);

let resultado = document.getElementById("resultado");
let error = document.getElementById("error");

resultado.innerHTML="";
error.innerHTML="";

if(isNaN(n1) || isNaN(n2) || isNaN(n3)){
error.innerHTML="Ingresa los 3 valores correctamente";
return;
}

let promedio = (n1+n2+n3)/3;

resultado.innerHTML = "Promedio: " + promedio.toFixed(2);

}

function limpiar(){

document.getElementById("n1").value="";
document.getElementById("n2").value="";
document.getElementById("n3").value="";
document.getElementById("resultado").innerHTML="";
document.getElementById("error").innerHTML="";

}

</script>

</body>
</html>
