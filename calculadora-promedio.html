<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Promedio | HerramientasPro</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(2,6,23,0.8);
backdrop-filter:blur(10px);
}

nav h1{
font-size:20px;
}

nav a{
color:white;
text-decoration:none;
}

/* MAIN */
.main{
display:flex;
justify-content:center;
align-items:center;
min-height:90vh;
}

/* CARD */
.card{
background:#1e293b;
padding:40px;
border-radius:15px;
width:380px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.3);
animation:fadeIn 1s ease;
}

/* ICON */
.icon{
font-size:32px;
color:#3b82f6;
margin-bottom:10px;
}

/* INPUTS */
select, input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
outline:none;
}

/* BOTONES */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.calcular{background:#3b82f6;color:white;}
.calcular:hover{background:#2563eb;}

.limpiar{background:#475569;color:white;}
.limpiar:hover{background:#334155;}

.add{background:#22c55e;color:white;}
.remove{background:#ef4444;color:white;}

/* RESULTADO */
.resultado{
margin-top:20px;
font-size:20px;
color:#22c55e;
font-weight:bold;
}

.error{
color:#ef4444;
margin-top:10px;
}

/* BOTONES EXTRA */
.extra-buttons{
display:flex;
gap:10px;
}

/* LINK */
.back{
display:block;
margin-top:20px;
color:#94a3b8;
text-decoration:none;
}

/* ANIMACIÓN */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<nav>
<h1>HerramientasPro</h1>
<a href="index.html">Inicio</a>
</nav>

<div class="main">

<div class="card">

<div class="icon">
<i class="fas fa-calculator"></i>
</div>

<h2>Calculadora de Promedio</h2>

<select id="cantidad" onchange="generarInputs()">
<option value="">Cantidad de números</option>
<option value="2">2 números</option>
<option value="3">3 números</option>
<option value="4">4 números</option>
<option value="5">5 números</option>
</select>

<div id="inputs"></div>

<div class="extra-buttons">
<button class="add" onclick="agregar()">+</button>
<button class="remove" onclick="quitar()">−</button>
</div>

<button class="calcular" onclick="calcular()">Calcular</button>
<button class="limpiar" onclick="limpiar()">Limpiar</button>

<div id="resultado" class="resultado"></div>
<div id="error" class="error"></div>

<a class="back" href="index.html">Volver</a>

</div>

</div>

<script>

function generarInputs(){
let cantidad = document.getElementById("cantidad").value;
let contenedor = document.getElementById("inputs");

contenedor.innerHTML = "";

for(let i=1;i<=cantidad;i++){
crearInput(i);
}
}

function crearInput(i){
let contenedor = document.getElementById("inputs");

let input = document.createElement("input");
input.type = "number";
input.placeholder = "Número " + i;
input.classList.add("numero");

input.addEventListener("input", calcularAuto);

contenedor.appendChild(input);
}

function agregar(){
let total = document.querySelectorAll(".numero").length + 1;
crearInput(total);
}

function quitar(){
let inputs = document.querySelectorAll(".numero");
if(inputs.length > 1){
inputs[inputs.length - 1].remove();
calcularAuto();
}
}

function calcular(){

let numeros = document.querySelectorAll(".numero");
let suma = 0;

if(numeros.length === 0){
mostrarError("Selecciona cantidad de números");
return;
}

for(let n of numeros){
let valor = parseFloat(n.value);
if(isNaN(valor)){
mostrarError("Completa todos los campos");
return;
}
suma += valor;
}

let promedio = suma / numeros.length;

mostrarResultado(promedio);

}

function calcularAuto(){

let numeros = document.querySelectorAll(".numero");

let completos = true;
let suma = 0;

for(let n of numeros){
let valor = parseFloat(n.value);
if(isNaN(valor)){
completos = false;
break;
}
suma += valor;
}

if(completos && numeros.length > 0){
let promedio = suma / numeros.length;
mostrarResultado(promedio);
}

}

function mostrarResultado(promedio){
document.getElementById("error").innerText="";
document.getElementById("resultado").innerText="Promedio: " + promedio.toFixed(2);
}

function mostrarError(msg){
document.getElementById("resultado").innerText="";
document.getElementById("error").innerText=msg;
}

function limpiar(){
document.getElementById("inputs").innerHTML="";
document.getElementById("resultado").innerText="";
document.getElementById("error").innerText="";
document.getElementById("cantidad").value="";
}

</script>

</body>
</html>
