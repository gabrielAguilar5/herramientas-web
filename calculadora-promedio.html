<!DOCTYPE html>
<html>
<head>
<title>Calculadora de Promedio</title>
</head>

<body>

<h1>Calculadora de Promedio</h1>

<p>Ingresa tres números:</p>

<input id="num1" type="number" placeholder="Número 1">
<br><br>

<input id="num2" type="number" placeholder="Número 2">
<br><br>

<input id="num3" type="number" placeholder="Número 3">
<br><br>

<button onclick="calcular()">Calcular Promedio</button>

<h2 id="resultado"></h2>

<script>
function calcular(){

let n1 = parseFloat(document.getElementById("num1").value);
let n2 = parseFloat(document.getElementById("num2").value);
let n3 = parseFloat(document.getElementById("num3").value);

let promedio = (n1+n2+n3)/3;

document.getElementById("resultado").innerText = "El promedio es: " + promedio;

}
</script>

</body>
</html>
